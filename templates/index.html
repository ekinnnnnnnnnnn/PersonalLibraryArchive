<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>
            Library
        </title>
    </head>
    <body>
        <h2>
            Welcome,{{username}}!
        </h2>
        <a href="/addbook">
            Add book!
        </a>
        <a href="exit">
            Exit.
        </a>
        <hr>
        <h3>
            Books
        </h3>
        {% if books %}
            <ul>
                {% for book in books %}
                    <li>
                        <a href="/book/{{book['id']}}">
                            {{book['bookname']}} - {{book['author']}} - {{book['type']}} - {{book['status']}} 
                        </a>
                        <a href="/deletebook/{{book['id']}}" onclick="return confirm('sure?')">
                            Delete
                        </a>
                    </li>
                {% endfor %}
            </ul>
            {% else %}
                <p>
                    No book added yet
                </p>
            {% endif %}
    </body>
</html>
